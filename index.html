        }

        #ticker {

            align-items: center;

            transform-style: preserve-3d;
            animation: rotate3D 12s linear infinite;
            margin-bottom: 30px;
        }

        @keyframes rotate3D {
            0% { transform: perspective(1000px) rotateX(0deg); }
            100% { transform: perspective(1000px) rotateX(360deg); }
        }

        .price { font-weight: bold; margin: 0 15px; color: var(--emerald); }

        /* FLICKER BRANDING */
        .brand-title {
            color: var(--yellow);

        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 22%, 24%, 55% { opacity: 0.3; }
        }

        .status-pulse {
            color: var(--emerald);
            font-size: 0.7rem;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; text-shadow: 0 0 0px var(--emerald); }
            50% { opacity: 1; text-shadow: 0 0 10px var(--emerald); }
            100% { opacity: 0.5; text-shadow: 0 0 0px var(--emerald); }
        }

        /* TERMINAL LOGS */
        #console {
            background: #050505;
            border: 1px solid #333;
            padding: 15px;
            height: 140px;
            margin-top: 20px;
            border-left: 4px solid var(--emerald);
        }

        .log { color: var(--emerald); font-size: 0.85rem; margin: 4px 0; }
    </style>
</head>
