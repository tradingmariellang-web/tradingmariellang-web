name:"Tradingmariellang Mainframe Build & Deploy"
on:
push:
   branches:
    - main
    
          pip install discord.py aiohttp flake8

      - name: Run Syntax and Compilation Lint Tests
        run: |
          # Fails the build workflow if there are raw Python syntax or indentation bugs
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          
          # Verifies that scripts compile completely without error arrays
          python -m py_compile *.py

  # STAGE 2: Automated Frontend Dashboard Deployment
  deploy_site:
    name: 🚀 Static Page Deployment
    needs: validate_code
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure GitHub Pages Node
        uses: actions/configure-pages@v4

      - name: Upload Static Artifact Arrays
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Stream Live to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
    - name: Run Code Quality Lint Check
      run: |
        # Install basic python linting tools
        pip install flake8
        
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

        
