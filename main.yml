name: "Tradingmariellang Mainframe Build & Deploy"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "mainframe-deployment"
  cancel-in-progress: true

jobs:
  # STAGE 1: Code Quality, Compilation, and Quality Check
  validate_code:
    name: 🛡️ Code Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install discord.py aiohttp flake8

      - name: Run Syntax and Compilation Lint Tests
        run: |
          # Fails the build workflow if there are raw Python syntax or indentation bugs
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          
          # Verifies that scripts compile completely without error arrays
          python -m py_compile *.py

  # STAGE 2: Automated Frontend Dashboard Deployment
  deploy_site:
    name: 🚀 Static Page Deployment
    needs: validate_code
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure GitHub Pages Node
        uses: actions/configure-pages@v4

      - name: Upload Static Artifact Arrays
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Stream Live to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
