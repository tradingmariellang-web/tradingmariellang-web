name: "Deploy Production Dashboard"

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: true

jobs:
  deploy_site:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Setup GitHub Pages Engine
        uses: actions/configure-pages@v4

      - name: Pack Static Website Bundle
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Publish Live to Pages Network
        id: deployment
        uses: actions/deploy-pages@v4
    - name: Test with pytest
      run: |
        pytest
